# Training Configuration - IMPROVED
# Object Detection & OCR System for Engineering Drawings

dataset:
  root: "D:/sotatek/datasets/BOM-Folder- BOM-Dataset.coco/train"
  annotations: "D:/sotatek/datasets/BOM-Folder- BOM-Dataset.coco/train/_annotations.coco.json"
  val_split: 0.15
  num_classes: 4  # 3 classes + background

model:
  backbone: "resnet50"
  pretrained: true
  min_size: 800
  max_size: 1333

training:
  batch_size: 2
  num_workers: 2
  learning_rate: 0.005
  weight_decay: 0.0005
  momentum: 0.9
  num_epochs: 100
  lr_step_size: 30
  lr_gamma: 0.1
  save_dir: "../models"

inference:
  confidence_threshold: 0.5
  nms_threshold: 0.3
  output_dir: "../outputs"

ocr:
  engine: "easyocr"
  lang: "en"
  use_gpu: true

web:
  host: "0.0.0.0"
  port: 7860
