# Training Configuration v2 - AGGRESSIVE AUGMENTATION
# Object Detection & OCR System for Engineering Drawings
# Optimized for small dataset (58 images) with class imbalance

dataset:
  root: "D:/sotatek/datasets/BOM-Folder- BOM-Dataset.coco/train"
  annotations: "D:/sotatek/datasets/BOM-Folder- BOM-Dataset.coco/train/_annotations.coco.json"
  val_split: 0.15
  num_classes: 4  # 3 classes + background
  copy_paste: true  # Copy-Paste augmentation for Note class

model:
  backbone: "resnet50"
  pretrained: true
  min_size: 1200
  max_size: 2000

training:
  batch_size: 2
  num_workers: 2
  num_epochs: 120
  # AdamW optimizer (better for small datasets than SGD)
  optimizer: "adamw"
  learning_rate: 0.0003
  weight_decay: 0.01
  # Fallback SGD params (used if optimizer=sgd)
  momentum: 0.9
  # CosineAnnealingWarmRestarts
  scheduler: "cosine_warm_restarts"
  T_0: 20        # restart every 20 epochs
  T_mult: 2      # double the restart period each time
  eta_min: 0.000005
  # Oversampling
  oversample_factor: 3  # 3x oversampling
  # Early stopping
  patience: 35
  # Save
  save_dir: "../models"
  save_every: 30

inference:
  confidence_threshold: 0.5
  nms_threshold: 0.3
  output_dir: "../outputs"

ocr:
  engine: "easyocr"
  lang: "en"
  use_gpu: true

web:
  host: "0.0.0.0"
  port: 7860
